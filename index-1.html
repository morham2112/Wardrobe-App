<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Outfit Line — Smart Wardrobe</title>

<!-- Home-screen / PWA-ish meta (works without a manifest file on iOS + Android) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Outfit Line">
<meta name="theme-color" content="#15181F">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-top">
      <h1>Outfit Line</h1>
      <button id="addPhotosBtn" class="btn-add" title="Add clothing photos">
        <span class="plus">+</span><span class="btn-add-label">Add</span>
      </button>
    </div>
    <p class="header-sub" id="statusLine">Loading your closet…</p>
  </header>

  <!-- Hidden native file input — this is the "read the folder" intake.
       Mobile browsers can't watch a folder in the background, so the user
       picks the new photo(s) from their clothes folder and the app takes it
       from there (dedupes by filename, sends new ones to Gemini once). -->
  <input type="file" id="fileInput" accept="image/*" multiple hidden>

  <!-- ===== FILTER TABS ===== -->
  <nav class="tabs" id="tabs" aria-label="Category filter">
    <button class="tab active" data-cat="All">All</button>
    <button class="tab" data-cat="Shirt">Shirts</button>
    <button class="tab" data-cat="Bottom">Bottoms</button>
    <button class="tab" data-cat="Shoe">Shoes</button>
    <button class="tab" data-cat="Accessory">Accessories</button>
  </nav>

  <!-- ===== ACTIVE OUTFIT STRIP ===== -->
  <div class="outfit-strip" id="outfitStrip" hidden>
    <div class="outfit-strip-items" id="outfitStripItems"></div>
    <button id="clearOutfitBtn" class="btn-clear">Clear</button>
  </div>

  <!-- ===== CLOTHES GRID ===== -->
  <main>
    <div class="grid" id="grid"></div>
    <div class="empty-state" id="emptyState" hidden>
      <p>Your closet is empty.</p>
      <p class="empty-sub">Tap <strong>+ Add</strong> and choose photos from your clothes folder to get started.</p>
    </div>
  </main>

  <!-- ===== LEGEND (colorblind-safe key: icons + text, never color alone) ===== -->
  <footer class="legend">
    <span class="legend-item"><span class="swatch selected-demo"></span>Selected</span>
    <span class="legend-item"><span class="swatch locked-demo"></span>Won't work</span>
    <span class="legend-item"><span class="swatch best-demo">★</span>Great match</span>
  </footer>

</div>

<!-- ===== REVIEW / EDIT MODAL (shown after Gemini tags a new photo) ===== -->
<div class="modal-backdrop" id="modalBackdrop" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <h2 id="modalTitle">Confirm item details</h2>
    <img id="modalImg" class="modal-img" alt="">

    <label>Name
      <input type="text" id="fieldName">
    </label>

    <label>Category
      <select id="fieldCategory">
        <option value="Shirt">Shirt</option>
        <option value="Bottom">Bottom</option>
        <option value="Shoe">Shoe</option>
        <option value="Accessory">Accessory</option>
      </select>
    </label>

    <label>Exact color (name or hex, e.g. "navy" or #1B3A6B)
      <input type="text" id="fieldColor">
    </label>

    <label>Tone
      <select id="fieldTone">
        <option value="Light">Light</option>
        <option value="Dark">Dark</option>
        <option value="Neutral">Neutral</option>
      </select>
    </label>

    <label>Formality
      <select id="fieldFormality">
        <option value="Casual">Casual</option>
        <option value="Sport">Sport</option>
        <option value="Dressy">Dressy</option>
      </select>
    </label>

    <div class="modal-actions">
      <button id="modalCancel" class="btn-secondary">Skip</button>
      <button id="modalSave" class="btn-primary">Save to closet</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
